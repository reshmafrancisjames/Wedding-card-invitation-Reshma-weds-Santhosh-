<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #4a4a4a;
            overflow-x: hidden;
        }
        .card {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #ffe3e3;
        }
        h1 { color: #d4a373; font-size: 2.5rem; margin-bottom: 10px; }
        h2 { color: #b7b7a4; font-size: 1.5rem; font-weight: 300; }
        .details { margin: 30px 0; font-size: 1.1rem; line-height: 1.8; }
        .photo-gallery img {
            width: 90%; max-width: 350px;
            border-radius: 15px;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #music-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #d4a373; color: white;
            border: none; padding: 12px 20px;
            border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 1rem; z-index: 1000;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop>
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>
    <button id="music-btn" onclick="toggleMusic()">🎵 Play Music</button>

    <div class="card">
        <h2>Save Our Date</h2>
        <h1>രേഷ്മ & സന്തോഷ്</h1>
        <p style="font-size: 1.2rem; color: #777;">Wedding Invitation</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="photo-gallery">
            <img src="photo1.jpg" alt="Our Photo">
        </div>

        <div class="details">
            <p><strong>തീയതി:</strong> തീയതി ഇവിടെ എഴുതാം</p>
            <p><strong>മുഹൂർത്തം:</strong> സമയം ഇവിടെ എഴുതാം</p>
            <p><strong>വേദി:</strong> ഓഡിറ്റോറിയം പേര്, സ്ഥലം</p>
        </div>
        
        <p style="color: #d4a373; font-style: italic;">നിങ്ങളുടെ സാന്നിധ്യം ഹൃദയപൂർവ്വം പ്രതീക്ഷിക്കുന്നു...</p>
    </div>

    <script>
        var audio = document.getElementById('bg-audio');
        var btn = document.getElementById('music-btn');
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸️ Pause Music";
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Music";
            }
        }
    </script>
</body>
</html>
